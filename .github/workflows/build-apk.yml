name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "APK app name"
        required: true
        default: "Production Notes"
      package_name:
        description: "Android package name"
        required: true
        default: "com.aakashpanta.productionnotes"
      app_url:
        description: "Your deployed Notes app URL"
        required: true
        default: "https://example.com"

permissions:
  contents: read
  actions: read

jobs:
  build-apk:
    name: Build WebView APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android WebView project
        shell: bash
        run: |
          set -euo pipefail

          APP_NAME="${{ github.event.inputs.app_name }}"
          PACKAGE_NAME="${{ github.event.inputs.package_name }}"
          APP_URL="${{ github.event.inputs.app_url }}"

          PROJECT_DIR="android-webview-apk"
          APP_DIR="$PROJECT_DIR/app"

          rm -rf "$PROJECT_DIR"

          mkdir -p "$APP_DIR/src/main/java"
          mkdir -p "$APP_DIR/src/main/res/values"
          mkdir -p "$APP_DIR/src/main/res/drawable"
          mkdir -p "$APP_DIR/src/main/res/mipmap-hdpi"
          mkdir -p "$APP_DIR/src/main/res/mipmap-mdpi"
          mkdir -p "$APP_DIR/src/main/res/mipmap-xhdpi"
          mkdir -p "$APP_DIR/src/main/res/mipmap-xxhdpi"
          mkdir -p "$APP_DIR/src/main/res/mipmap-xxxhdpi"

          PACKAGE_PATH=$(echo "$PACKAGE_NAME" | tr '.' '/')
          mkdir -p "$APP_DIR/src/main/java/$PACKAGE_PATH"

          cat > "$PROJECT_DIR/settings.gradle" <<EOF
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "ProductionNotesWebView"
          include ":app"
          EOF

          cat > "$PROJECT_DIR/build.gradle" <<EOF
          plugins {
              id "com.android.application" version "8.7.3" apply false
          }
          EOF

          cat > "$APP_DIR/build.gradle" <<EOF
          plugins {
              id "com.android.application"
          }

          android {
              namespace "$PACKAGE_NAME"
              compileSdk 35

              defaultConfig {
                  applicationId "$PACKAGE_NAME"
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          cat > "$APP_DIR/src/main/res/values/strings.xml" <<EOF
          <resources>
              <string name="app_name">$APP_NAME</string>
              <string name="app_url">$APP_URL</string>
          </resources>
          EOF

          cat > "$APP_DIR/src/main/res/values/colors.xml" <<EOF
          <resources>
              <color name="black">#000000</color>
              <color name="white">#FFFFFF</color>
              <color name="background">#05070B</color>
          </resources>
          EOF

          cat > "$APP_DIR/src/main/AndroidManifest.xml" <<EOF
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

              <application
                  android:allowBackup="true"
                  android:usesCleartextTraffic="false"
                  android:theme="@style/AppTheme"
                  android:label="@string/app_name"
                  android:resizeableActivity="true"
                  android:supportsRtl="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>

                  </activity>

              </application>

          </manifest>
          EOF

          cat > "$APP_DIR/src/main/res/values/styles.xml" <<EOF
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowFullscreen">false</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:statusBarColor">#05070B</item>
                  <item name="android:navigationBarColor">#05070B</item>
              </style>
          </resources>
          EOF

          cat > "$APP_DIR/src/main/java/$PACKAGE_PATH/MainActivity.java" <<EOF
          package $PACKAGE_NAME;

          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.graphics.Color;
          import android.net.ConnectivityManager;
          import android.net.NetworkInfo;
          import android.os.Bundle;
          import android.view.View;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.FrameLayout;
          import android.widget.TextView;

          public class MainActivity extends Activity {
              private WebView webView;
              private String appUrl;

              @SuppressLint("SetJavaScriptEnabled")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  appUrl = getString(getResources().getIdentifier("app_url", "string", getPackageName()));

                  FrameLayout root = new FrameLayout(this);
                  root.setBackgroundColor(Color.rgb(5, 7, 11));

                  webView = new WebView(this);
                  webView.setLayoutParams(new FrameLayout.LayoutParams(
                          FrameLayout.LayoutParams.MATCH_PARENT,
                          FrameLayout.LayoutParams.MATCH_PARENT
                  ));

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);
                  settings.setSupportZoom(false);
                  settings.setBuiltInZoomControls(false);
                  settings.setDisplayZoomControls(false);
                  settings.setAllowFileAccess(false);
                  settings.setAllowContentAccess(false);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_NEVER_ALLOW);

                  webView.setWebChromeClient(new WebChromeClient());

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                          view.loadUrl(request.getUrl().toString());
                          return true;
                      }

                      @Override
                      public void onPageFinished(WebView view, String url) {
                          super.onPageFinished(view, url);
                      }
                  });

                  root.addView(webView);
                  setContentView(root);

                  if (isOnline()) {
                      webView.loadUrl(appUrl);
                  } else {
                      showOfflineScreen(root);
                  }
              }

              private boolean isOnline() {
                  try {
                      ConnectivityManager cm = (ConnectivityManager) getSystemService(CONNECTIVITY_SERVICE);
                      NetworkInfo info = cm.getActiveNetworkInfo();
                      return info != null && info.isConnected();
                  } catch (Exception e) {
                      return false;
                  }
              }

              private void showOfflineScreen(FrameLayout root) {
                  TextView message = new TextView(this);
                  message.setText("No internet connection. Please connect and reopen the app.");
                  message.setTextColor(Color.WHITE);
                  message.setTextSize(18);
                  message.setPadding(48, 48, 48, 48);
                  message.setGravity(android.view.Gravity.CENTER);

                  root.removeAllViews();
                  root.addView(message, new FrameLayout.LayoutParams(
                          FrameLayout.LayoutParams.MATCH_PARENT,
                          FrameLayout.LayoutParams.MATCH_PARENT
                  ));
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

      - name: Build debug APK
        working-directory: android-webview-apk
        run: |
          chmod +x gradlew || true
          gradle wrapper
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-notes-debug-apk
          path: android-webview-apk/app/build/outputs/apk/debug/app-debug.apk
